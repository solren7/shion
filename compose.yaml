# Copy your Shion configuration to ./data/config.toml and secrets to
# ./data/.env, then run:
#
#   docker compose up -d
#   docker compose logs -f shion
#
# Credentials can live in either place:
#   - ./data/.env — read by shion itself inside the container (dotenvy), or
#   - the stack/shell environment (a Portainer/dockhand stack .env, or exported
#     shell variables) — passed through via the credential entries below.
# Note the compose project .env only interpolates ${VAR}s in this file; it
# never reaches the container on its own, hence the explicit passthrough.
# Omit unused credentials from the stack .env entirely — a blank `VAR=` line
# still injects an empty string, which shadows the same key in ./data/.env.
#
# Override the image tag, timezone, or host directories with shell variables,
# for example: SHION_TAG=v0.1.0 SHION_DATA_DIR=/srv/shion docker compose up -d

services:
  shion:
    image: ghcr.io/solren7/shion:${SHION_TAG:-latest}
    # For a local-CI deployment that builds on the Docker host instead of
    # pulling from ghcr (e.g. a Dockhand git stack on the NAS), set
    # SHION_PULL_POLICY=build and a non-clashing SHION_TAG such as `local`.
    # The default remains pull-from-registry.
    build: .
    container_name: shion
    restart: unless-stopped
    pull_policy: ${SHION_PULL_POLICY:-always}
    init: true
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SHION_HOME: /data
      # Credential passthrough from the stack/shell environment. The null-value
      # form matters: an unset variable is *removed* from the container env
      # (rather than injected as ""), so it can never shadow ./data/.env —
      # dotenvy skips variables that already exist, even empty ones.
      DEEPSEEK_API_KEY:
      OPENAI_API_KEY:
      ANTHROPIC_API_KEY:
      OPENROUTER_API_KEY:
      FEISHU_APP_ID:
      FEISHU_APP_SECRET:
      TELEGRAM_BOT_TOKEN:
      API_SERVER_KEY:
      HASS_TOKEN:
      HASS_URL:
    working_dir: /workspace
    volumes:
      # config.toml, .env, databases, logs, memories, and installed skills.
      - ${SHION_DATA_DIR:-./data}:/data
      # Files that the agent's file and shell tools are allowed to work with.
      - ${SHION_WORKSPACE_DIR:-./workspace}:/workspace
    stop_grace_period: 30s
    # Cap docker's own copy of stderr. The durable month of history lives in
    # /data/logs/gateway.YYYY-MM-DD.log (daily files, 30 kept, self-pruning).
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # The gateway needs no published port for Telegram, Feishu, WeChat, or
    # Home Assistant. To expose Shion's HTTP API, first configure:
    #
    #   [channels.api]
    #   enabled = true
    #   bind = "0.0.0.0"
    #   port = 8765
    #
    # in ./data/config.toml, set API_SERVER_KEY in ./data/.env, then uncomment:
    # ports:
    #   - "127.0.0.1:${SHION_API_PORT:-8765}:8765"
