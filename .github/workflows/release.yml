name: Release

on:
  push:
    tags:
      - "v*"
      - "V*"

permissions:
  contents: read

jobs:
  package:
    name: Package ${{ matrix.asset_suffix }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            asset_suffix: darwin-arm64
          - target: x86_64-apple-darwin
            asset_suffix: darwin-amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/shion" "dist/shion"
          tar -czf "dist/shion-${{ matrix.asset_suffix }}.tar.gz" -C dist shion
          rm -f dist/shion
          ls -lh dist

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: shion-${{ matrix.asset_suffix }}
          path: dist/shion-${{ matrix.asset_suffix }}.tar.gz
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish Release
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum shion-*.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Generate build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/shion-*.tar.gz
            dist/SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
